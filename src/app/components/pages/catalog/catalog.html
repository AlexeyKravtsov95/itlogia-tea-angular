<div class="container">
  <h1 class="m-3 m-md-5 text-center h1">Наши чайные коллекции</h1>

  <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3 g-md-4 m-3 m-md-5">
    @for (item of catalog(); track item.title; let i = $index) {
      <div class="col d-flex">
        <catalog-card class="w-100 h-100" [catalog]="item"></catalog-card>
      </div>
    }
  </div>
  @if (loading()) {
    <div class="d-flex justify-content-center">
      <div class="spinner-border" role="status">

      </div>
    </div>
  }
</div>
