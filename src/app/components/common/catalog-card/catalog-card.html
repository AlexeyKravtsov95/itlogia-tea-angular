<div class="card h-100">
  <img
    [src]="catalog.image"
    class="card-img-top h-50 w-50 mx-auto"
    alt="Banner of card {{ catalog.id }}"
  >

  <div class="card-body d-flex flex-column">
    <h5 class="card-title">{{ catalog.title }}</h5>

    <p class="card-text flex-grow-1">
      {{ catalog.description | shortText }}
    </p>

    <div class="d-flex justify-content-between align-items-center mt-auto">
      <span class="fs-5">{{ catalog.price }} руб.</span>

      <div class="d-flex flex-row gap-2">
        <a class="btn btn-danger" type="button" routerLink="/order" [queryParams]="{product: catalog.title}">Купить</a>
        <a class="btn btn-primary" type="button" [routerLink]="['/product', catalog.id]">Подробнее</a>
      </div>
    </div>
  </div>
</div>
